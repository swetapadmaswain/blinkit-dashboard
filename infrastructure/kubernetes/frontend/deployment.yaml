apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-frontend
  labels:
    app: discovery-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discovery-frontend
  template:
    metadata:
      labels:
        app: discovery-frontend
    spec:
      containers:
      - name: frontend
        image: discovery-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://discovery-backend-service:8000/api"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
