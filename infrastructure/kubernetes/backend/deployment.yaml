apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-backend
  labels:
    app: discovery-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discovery-backend
  template:
    metadata:
      labels:
        app: discovery-backend
    spec:
      containers:
      - name: backend
        image: discovery-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: discovery-secrets
              key: database-url
        - name: MONGODB_URL
          valueFrom:
            secretKeyRef:
              name: discovery-secrets
              key: mongodb-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: discovery-secrets
              key: redis-url
        - name: ELASTICSEARCH_URL
          valueFrom:
            secretKeyRef:
              name: discovery-secrets
              key: elasticsearch-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
