apiVersion: v1
kind: Secret
metadata:
  name: discovery-secrets
type: Opaque
stringData:
  database-url: "postgresql://postgres:password@postgres:5432/discovery_engine"
  mongodb-url: "mongodb://mongodb:27017/discovery_engine"
  redis-url: "redis://redis:6379/0"
  elasticsearch-url: "http://elasticsearch:9200"
  postgres-user: "postgres"
  postgres-password: "password"
  jwt-secret-key: "your-jwt-secret-key-change-this"
