services:
  - type: worker
    name: blinkit-worker
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: celery -A app.tasks worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: database_url
        fromDatabase:
          name: blinkit-postgres
          property: connectionString
      - key: mongodb_url
        value: mongodb+srv://blinkit_admin:Z%23if3uRQk_KH%239U@cluster0.t9ajn7r.mongodb.net/?appName=Cluster0
      - key: redis_url
        fromService:
          type: redis
          name: blinkit-redis
          property: connectionString
      - key: jwt_secret_key
        generateValue: true
      - key: cors_origins
        value: *,http://localhost:3000
