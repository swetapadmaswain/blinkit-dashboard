name: Ingest Reviews

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Review Ingestion
        run: |
          curl -X POST https://blinkit-backend-9jtp.onrender.com/api/v1/ingest/trigger
